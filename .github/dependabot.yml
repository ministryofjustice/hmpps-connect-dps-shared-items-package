version: 2
updates:
  - package-ecosystem: npm
    directory: /
    ignore:
      - dependency-name: "@types/node"
        versions:
          - ">=25"
      - dependency-name: "govuk-frontend"
        versions:
          - ">=6"
      - dependency-name: "typescript"
        versions:
          - ">=6"
    cooldown:
      default-days: 5
      exclude:
        - "@ministryofjustice/*"
    schedule:
      interval: weekly
      day: wednesday
    groups:
      development:
        dependency-type: "development"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    cooldown:
      default-days: 5
      exclude:
        - "ministryofjustice/*"

  - package-ecosystem: pre-commit
    cooldown:
      default-days: 5
    directory: /
    schedule:
      interval: weekly
      day: wednesday
